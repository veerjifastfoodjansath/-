<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burgers</title>
  <link rel="stylesheet" href="product-style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-btn">🏠 Main Page</a>
    <a href="javascript:history.back()" class="nav-btn">← Back</a>
    <a href="cart.html" class="nav-btn cart-btn">🛒 Cart <span class="cart-count" id="cartCount">0</span></a>
  </nav>

  <h1 class="page-title">🍔 Burger Varieties</h1>

  <div class="products-container">
    <div class="product-card">
      <img src="images/classic-burger.png" alt="Classic" class="product-img">
      <div class="product-name">Classic Burger</div>
      <div class="product-price">₹20</div>
      <button class="add-cart-btn" onclick="addToCart('Classic Burger', 20, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/paneer-burger.png" alt="Paneer" class="product-img">
      <div class="product-name">Paneer Burger</div>
      <div class="product-price">₹40</div>
      <button class="add-cart-btn" onclick="addToCart('Paneer Burger', 40, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/single-slice-burger.png" alt="Single" class="product-img">
      <div class="product-name">Single Cheese Slice Burger</div>
      <div class="product-price">₹60</div>
      <button class="add-cart-btn" onclick="addToCart('Single Cheese Slice Burger', 60, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/double-slice-burger.png" alt="Double" class="product-img">
      <div class="product-name">Double Cheese Slice Burger</div>
      <div class="product-price">₹70</div>
      <button class="add-cart-btn" onclick="addToCart('Double Cheese Slice Burger', 70, this)">Add to Cart</button>
    </div>
  </div>

  </div><footer class="product-page-footer">
    <p>✨Lal बटन दबाने पर आपका सामान cart में चला जायेगा , और फिर ऊपर right side में दिए cart पर क्लिक कर apna order मंगवाए.<br>
    © 2026 Veer Ji Fast Food Corner.</p>
  </footer>

  <script src="cart.js"></script>
</body>
</html>
