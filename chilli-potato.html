<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chilli Potato</title>
  <link rel="stylesheet" href="product-style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-btn">🏠 Main Page</a>
    <a href="javascript:history.back()" class="nav-btn">← Back</a>
    <a href="cart.html" class="nav-btn cart-btn">🛒 Cart <span class="cart-count" id="cartCount">0</span></a>
  </nav>

  <h1 class="page-title">🌶️ Chilli Potato</h1>

  <div class="products-container">
    <div class="product-card">
      <img src="images/chilli-potato-half.png" alt="Half" class="product-img">
      <div class="product-name">Chilli Potato (Half)</div>
      <div class="product-price">₹40</div>
      <button class="add-cart-btn" onclick="addToCart('Chilli Potato Half', 40, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/chilli-potato-full.png" alt="Full" class="product-img">
      <div class="product-name">Chilli Potato (Full)</div>
      <div class="product-price">₹80</div>
      <button class="add-cart-btn" onclick="addToCart('Chilli Potato Full', 80, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/honey-chilli-potato.png" alt="Honey Half" class="product-img">
      <div class="product-name">Honey Chilli Potato (Half)</div>
      <div class="product-price">₹50</div>
      <button class="add-cart-btn" onclick="addToCart('Honey Chilli Potato Half', 50, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/honey-chilli-potato.png" alt="Honey Full" class="product-img">
      <div class="product-name">Honey Chilli Potato (Full)</div>
      <div class="product-price">₹100</div>
      <button class="add-cart-btn" onclick="addToCart('Honey Chilli Potato Full', 100, this)">Add to Cart</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
