<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — Veer Ji Fast Food</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       CART PAGE — CSS
       ============================================================ */
    :root {
      --gold: #D4A853;
      --gold-light: #E8C47A;
      --dark: #0A0A0A;
      --dark-2: #111111;
      --dark-3: #1A1A1A;
      --white: #F5F2EC;
      --red: #E05555;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── TOP NAVIGATION ── */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212,168,83,0.15);
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--white);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.04);
    }
    .nav-back:hover { border-color: var(--gold); color: var(--gold); }

    .nav-home {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      text-decoration: none;
    }

    .nav-cart-count {
      font-size: 0.82rem;
      color: rgba(245,242,236,0.5);
      font-weight: 400;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 2.5rem 1.5rem 1rem;
      text-align: center;
    }

    .page-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      color: var(--white);
    }

    /* ── EMPTY CART STATE ── */
    .empty-cart {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      text-align: center;
      gap: 1.2rem;
    }

    .empty-icon { font-size: 4rem; }

    .empty-text {
      font-size: 1.1rem;
      color: rgba(245,242,236,0.5);
      font-weight: 300;
    }

    .empty-btn {
      padding: 14px 36px;
      background: var(--gold);
      color: #111;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.3s ease;
    }
    .empty-btn:hover { background: var(--gold-light); }

    /* ── CART ITEMS LIST ── */
    .cart-wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 1rem 1.2rem 2rem;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      margin-bottom: 0.8rem;
      transition: all 0.3s ease;
    }

    .cart-item:hover {
      border-color: rgba(212,168,83,0.2);
    }

    /* Item info */
    .cart-item-info { flex: 1; }

    .cart-item-parent {
      font-size: 0.68rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .cart-item-name {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
    }

    /* Quantity controls */
    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(212,168,83,0.3);
      background: transparent;
      color: var(--gold);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .qty-btn:hover { background: rgba(212,168,83,0.12); border-color: var(--gold); }

    .qty-num {
      font-weight: 700;
      font-size: 0.95rem;
      min-width: 20px;
      text-align: center;
    }

    /* Price */
    .cart-item-price {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
      min-width: 55px;
      text-align: right;
    }

    /* Remove button */
    .cart-remove {
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      transition: color 0.2s ease;
      line-height: 1;
    }
    .cart-remove:hover { color: var(--red); }

    /* ── ORDER SUMMARY ── */
    .order-summary {
      background: var(--dark-3);
      border: 1px solid rgba(212,168,83,0.15);
      border-radius: 18px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }

    .summary-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 1rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      font-size: 0.85rem;
      color: rgba(245,242,236,0.6);
    }

    .summary-row.total {
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 0.5rem;
      padding-top: 1rem;
      font-size: 1.1rem;
      color: var(--white);
      font-weight: 700;
    }

    .summary-row.total span:last-child {
      font-family: var(--font-display);
      color: var(--gold);
      font-size: 1.3rem;
    }

    /* ── ACTION BUTTONS ── */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 1.5rem;
    }

    /* WhatsApp / Call to order */
    /* CHANGE PHONE NUMBER HERE if needed */
    .btn-order {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      background: var(--gold);
      color: #111;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-order:hover { background: var(--gold-light); transform: translateY(-2px); }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
    }
    .btn-whatsapp:hover { background: #1fbc58; }

    .btn-continue {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: transparent;
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.85rem;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-continue:hover { border-color: var(--gold); color: var(--gold); }

    /* Note about cart clearing */
    .cart-note {
      font-size: 0.72rem;
      color: rgba(245,242,236,0.25);
      text-align: center;
      margin-top: 1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       TOP NAVIGATION
       ============================================================ -->
  <nav class="top-nav">
    <a href="javascript:history.back()" class="nav-back">&#8592; Back</a>
    <a href="index.html" class="nav-home">Veer Ji</a>
    <span class="nav-cart-count" id="nav-cart-count">Cart</span>
  </nav>


  <!-- Page Header -->
  <div class="page-header">
    <p class="page-eyebrow">Your Order</p>
    <h1 class="page-title">Your Cart 🛒</h1>
  </div>


  <!-- Cart content — filled by JS -->
  <div class="cart-wrap" id="cart-wrap">
    <!-- Injected by JS -->
  </div>


  <script>
  /* ============================================================
     CART PAGE — JAVASCRIPT
     ============================================================ */

  /* Cart stored in sessionStorage — clears on browser close/refresh */
  function getCart() {
    try { return JSON.parse(sessionStorage.getItem('veerji_cart') || '[]'); }
    catch { return []; }
  }

  function saveCart(cart) {
    sessionStorage.setItem('veerji_cart', JSON.stringify(cart));
  }

  function updateQty(id, delta) {
    let cart = getCart();
    const item = cart.find(c => c.id === id);
    if (!item) return;
    item.qty = Math.max(1, item.qty + delta);
    saveCart(cart);
    renderCart();
  }

  function removeItem(id) {
    let cart = getCart().filter(c => c.id !== id);
    saveCart(cart);
    renderCart();
  }

  function renderCart() {
    const cart = getCart();
    const wrap = document.getElementById('cart-wrap');
    const countEl = document.getElementById('nav-cart-count');

    if (countEl) {
      countEl.textContent = cart.length > 0 ? `${cart.length} item${cart.length > 1 ? 's' : ''}` : 'Cart';
    }

    if (cart.length === 0) {
      wrap.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🛒</div>
          <p class="empty-text">Your cart is empty.<br>Add something delicious!</p>
          <a href="index.html" class="empty-btn">Browse Menu</a>
        </div>
      `;
      return;
    }

    const subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

    wrap.innerHTML = `
      <!-- Cart items -->
      ${cart.map(item => `
        <div class="cart-item" id="ci-${item.id}">
          <div class="cart-item-info">
            <div class="cart-item-parent">${item.parent}</div>
            <div class="cart-item-name">${item.name}</div>
          </div>
          <div class="qty-wrap">
            <button class="qty-btn" onclick="updateQty('${item.id}', -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
          </div>
          <div class="cart-item-price">₹${item.price * item.qty}</div>
          <button class="cart-remove" onclick="removeItem('${item.id}')" title="Remove">✕</button>
        </div>
      `).join('')}

      <!-- Order summary -->
      <div class="order-summary">
        <div class="summary-title">Order Summary</div>
        <div class="summary-row">
          <span>Subtotal (${cart.length} item${cart.length > 1 ? 's' : ''})</span>
          <span>₹${subtotal}</span>
        </div>
        <div class="summary-row">
          <span>Packaging</span>
          <span>Free</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>₹${subtotal}</span>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="action-buttons">

        <!-- WhatsApp order — CHANGE PHONE NUMBER HERE -->
        <a
          href="https://wa.me/919286175004?text=${encodeURIComponent(buildWhatsAppMsg(cart, subtotal))}"
          target="_blank"
          class="btn-order btn-whatsapp"
        >
          📲 Order via WhatsApp
        </a>

        <!-- Call to order — CHANGE PHONE NUMBER HERE -->
        <a href="tel:+919286175004" class="btn-order">
          📞 Call to Order — +91 92861 75004
        </a>

        <!-- Continue shopping -->
        <a href="index.html" class="btn-continue">
          ← Continue Shopping
        </a>

      </div>

      <!-- Cart clears on refresh note -->
      <p class="cart-note">
        ⚠️ Cart resets if you close or refresh the browser.<br>
        Complete your order before leaving!
      </p>
    `;
  }

  /* Build WhatsApp message from cart */
  function buildWhatsAppMsg(cart, total) {
    let msg = `Hello Veer Ji Fast Food! 🙏\n\nI want to order:\n\n`;
    cart.forEach(item => {
      msg += `• ${item.name} (${item.parent}) × ${item.qty} = ₹${item.price * item.qty}\n`;
    });
    msg += `\n*Total: ₹${total}*\n\nPlease confirm my order. Thank you!`;
    return msg;
  }

  // Run
  renderCart();
  </script>

</body>
</html>
