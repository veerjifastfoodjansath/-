<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manchurian</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-btn">🏠 Main Page</a>
    <a href="javascript:history.back()" class="nav-btn">← Back</a>
    <a href="CART.html" class="nav-btn cart-btn">🛒 Cart <span class="cart-count" id="cartCount">0</span></a>
  </nav>

  <h1 class="page-title">🍲 Manchurian</h1>

  <!-- HALF SECTION -->
  <h2 class="section-divider">— HALF PLATE —</h2>
  <div class="products-container">
    <div class="product-card">
      <img src="images/manchurian-half.png" alt="Half" class="product-img">
      <div class="product-name">Manchurian (Half)</div>
      <div class="product-desc">Smaller serving plate</div>
      <div class="product-price">₹60</div>
      <button class="add-cart-btn" onclick="addToCart('Manchurian Half', 60, this)">Add to Cart</button>
    </div>
  </div>

  <!-- FULL SECTION -->
  <h2 class="section-divider">— FULL PLATE —</h2>
  <div class="products-container">
    <div class="product-card">
      <img src="images/manchurian-full.png" alt="Full" class="product-img">
      <div class="product-name">Manchurian (Full)</div>
      <div class="product-desc">Full family serving</div>
      <div class="product-price">₹120</div>
      <button class="add-cart-btn" onclick="addToCart('Manchurian Full', 120, this)">Add to Cart</button>
    </div>
  </div>

  <script src="cart.js"></script>
</body>
</html>
