<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Momos</title>
  <link rel="stylesheet" href="product-style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-btn">🏠 Main Page</a>
    <a href="javascript:history.back()" class="nav-btn">← Back</a>
    <a href="cart.html" class="nav-btn cart-btn">🛒 Cart <span class="cart-count" id="cartCount">0</span></a>
  </nav>

  <h1 class="page-title">🥟 Momos Varieties</h1>

  <div class="products-container">
    <div class="product-card">
      <img src="images/menu/momos-steam.png" alt="Steam" class="product-img">
      <div class="product-name">Steam Momos (Half)</div>
      <div class="product-price">₹30</div>
      <button class="add-cart-btn" onclick="addToCart('Steam Momos Half', 30, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/menu/momos-steam.png" alt="Steam" class="product-img">
      <div class="product-name">Steam Momos (Full)</div>
      <div class="product-price">₹60</div>
      <button class="add-cart-btn" onclick="addToCart('Steam Momos Full', 60, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/menu/momos-fried.png" alt="Fried" class="product-img">
      <div class="product-name">Fried Momos (Half)</div>
      <div class="product-price">₹30</div>
      <button class="add-cart-btn" onclick="addToCart('Fried Momos Half', 30, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/menu/momos-fried.png" alt="Fried" class="product-img">
      <div class="product-name">Fried Momos (Full)</div>
      <div class="product-price">₹60</div>
      <button class="add-cart-btn" onclick="addToCart('Fried Momos Full', 60, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/menu/paneer-momos.png" alt="Paneer" class="product-img">
      <div class="product-name">Paneer Momos (Half)</div>
      <div class="product-price">₹50</div>
      <button class="add-cart-btn" onclick="addToCart('Paneer Momos Half', 50, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/menu/paneer-momos.png" alt="Paneer" class="product-img">
      <div class="product-name">Paneer Momos (Full)</div>
      <div class="product-price">₹100</div>
      <button class="add-cart-btn" onclick="addToCart('Paneer Momos Full', 100, this)">Add to Cart</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
