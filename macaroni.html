<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Macaroni</title>
  <link rel="stylesheet" href="product-style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="nav-btn">🏠 Main Page</a>
    <a href="javascript:history.back()" class="nav-btn">← Back</a>
    <a href="cart.html" class="nav-btn cart-btn">🛒 Cart <span class="cart-count" id="cartCount">0</span></a>
  </nav>

  <h1 class="page-title">🍝 Macaroni</h1>

  <div class="products-container">
    <div class="product-card">
      <img src="images/menu/macaroni.png" alt="Macaroni Half" class="product-img">
      <div class="product-name">Macaroni (Half)</div>
      <div class="product-desc">Creamy Indian-style macaroni</div>
      <div class="product-price">₹30</div>
      <button class="add-cart-btn" onclick="addToCart('Macaroni Half', 30, this)">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/menu/macaroni.png" alt="Macaroni Full" class="product-img">
      <div class="product-name">Macaroni (Full)</div>
      <div class="product-desc">Creamy Indian-style macaroni</div>
      <div class="product-price">₹60</div>
      <button class="add-cart-btn" onclick="addToCart('Macaroni Full', 60, this)">Add to Cart</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
